<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gabriel Bueno | CV Digital</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #121212;
      background-image: radial-gradient(circle at 50% 50%, #2a2a35 0%, #121212 100%);
      color: #f8f8f2;
      font-family: 'Fira Code', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    /* MacOS-like Terminal Window */
    .terminal-window {
      background-color: #282a36;
      width: 100%;
      max-width: 900px;
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .title-bar {
      background-color: #1e1f29;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #191a21;
    }

    .mac-buttons {
      display: flex;
      gap: 8px;
    }

    .mac-buttons span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .close { background-color: #ff5f56; }
    .minimize { background-color: #ffbd2e; }
    .maximize { background-color: #27c93f; }

    .window-title {
      flex: 1;
      text-align: center;
      color: #6272a4;
      font-size: 0.85rem;
      font-weight: 600;
      margin-left: -44px; /* Offset to center text ignoring buttons */
    }

    .terminal-content {
      padding: 24px;
      overflow-y: auto;
      max-height: 80vh;
    }

    #terminal-output {
      line-height: 1.6;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .prompt {
      color: #ff79c6; /* Pink */
      font-weight: 600;
    }

    .cmd {
      color: #50fa7b; /* Green */
      font-weight: 600;
    }

    .output-text {
      color: #f1fa8c; /* Yellowish for strings */
    }
    
    .output-info {
      color: #8be9fd; /* Cyan for info */
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.1rem;
      background-color: #f8f8f2;
      animation: blink 1s step-end infinite;
      vertical-align: middle;
      margin-left: 5px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .links-section {
      margin-top: 30px;
      display: none;
      animation: fadeIn 1s forwards;
      border-top: 1px dashed #6272a4;
      padding-top: 20px;
    }

    @keyframes fadeIn {
      to { display: flex; opacity: 1; }
      from { opacity: 0; }
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      margin-right: 15px;
      padding: 8px 16px;
      background: transparent;
      color: #8be9fd;
      text-decoration: none;
      border: 1px solid #6272a4;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .social-btn:hover {
      background: #8be9fd;
      color: #282a36;
      border-color: #8be9fd;
      box-shadow: 0 0 15px rgba(139, 233, 253, 0.4);
      transform: translateY(-2px);
    }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .terminal-content { padding: 16px; }
      .social-btn { display: flex; margin-bottom: 12px; margin-right: 0; justify-content: center; }
      .links-section { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="terminal-window">
    <div class="title-bar">
      <div class="mac-buttons">
        <span class="close"></span>
        <span class="minimize"></span>
        <span class="maximize"></span>
      </div>
      <div class="window-title">gabriel@vortexyweb: ~/cv-digital</div>
    </div>
    
    <div class="terminal-content" id="terminal-scroll">
      <div id="terminal-output"></div>
      <div class="cursor" id="cursor"></div>

      <div class="links-section" id="links">
        <a href="Gabriel_Bueno_CV.pdf" download class="social-btn">> Baixar_CV.pdf</a>
        <a href="https://linkedin.com/in/gabriel-bueno-67ab79383" target="_blank" class="social-btn">> LinkedIn.exe</a>
        <a href="https://github.com/Vortexyweb" target="_blank" class="social-btn">> GitHub.sh</a>
        <a href="https://wa.me/5541988062465" target="_blank" class="social-btn">> WhatsApp.bat</a>
      </div>
    </div>
  </div>

  <script>
    const cvData = [
      { type: 'output', text: '<span class="output-text">Last login: Thu Jul 09 13:15:22 on console</span>\n<span class="output-info">Welcome to GabrielOS (Darwin Kernel Version 22.1.0)</span>\n' },
      { type: 'cmd', text: 'fetch-profile --user gabriel_bueno' },
      { type: 'output', text: '<span class="output-info">[✓] Autenticação concluída.</span>\n<span class="output-info">[✓] Permissões verificadas.</span>\n<span class="output-info">[✓] Carregando módulos do currículo...</span>\n' },
      { type: 'cmd', text: 'dig TXT bio.cv.local +short' },
      { type: 'output', text: '<span class="output-text">"Gabriel Bueno - Estudante de ADS na Uninter e Desenvolvedor Backend."</span>\n<span class="output-text">"Transição de sólida experiência em coordenação operacional e liderança para TI."</span>\n<span class="output-text">"Foco em Node.js, Python, FastAPI, e Arquitetura de Redes."</span>' },
      { type: 'cmd', text: 'dig TXT skills.cv.local +short' },
      { type: 'output', text: '<span class="output-info">--- TECNOLOGIA ---</span>\n<span class="output-text">"Node.js, Python, JavaScript (ES6), Git & GitHub, SQLite, Redes."</span>\n<span class="output-info">--- OPERACIONAL ---</span>\n<span class="output-text">"Liderança de Equipes, Atendimento ao Cliente, Gestão de Conflitos, PDV."</span>' },
      { type: 'cmd', text: 'dig TXT projects.cv.local +short' },
      { type: 'output', text: '<span class="output-info">[Lunae]</span> <span class="output-text">App Full-stack (React Native + FastAPI) para gestão de ciclo de casais.</span>\n<span class="output-info">[VortexScanner]</span> <span class="output-text">Ferramenta em Node.js para varredura de IPs e resolução DNS.</span>\n<span class="output-info">[DNS-CV]</span> <span class="output-text">Servidor DNS customizado para entrega deste próprio currículo.</span>\n<span class="output-info">[VortexWiki]</span> <span class="output-text">Wiki Markdown com auto-save em tempo real e busca.</span>\n<span class="output-info">[VortexMonitor]</span> <span class="output-text">Dashboard Cyberpunk de monitoramento de hardware.</span>' },
      { type: 'cmd', text: 'cat contatos.txt' },
      { type: 'output', text: '<span class="output-info">Conexão estabelecida com sucesso. Acesse os links abaixo para contato direto:</span>' }
    ];

    const outputDiv = document.getElementById('terminal-output');
    const cursor = document.getElementById('cursor');
    const links = document.getElementById('links');
    const scrollContainer = document.getElementById('terminal-scroll');

    async function typeText(text, isCmd) {
      const prefix = isCmd ? '<span class="prompt">➜ </span> <span class="cmd">' : '';
      const suffix = isCmd ? '</span>\n' : '\n';
      
      outputDiv.innerHTML += prefix;
      
      // Se for HTML (como nossas spans coloridas), injetamos direto sem delay de digitação
      if (!isCmd) {
        outputDiv.innerHTML += text + suffix;
        scrollContainer.scrollTop = scrollContainer.scrollHeight;
        return;
      }

      // Efeito de digitação apenas para os comandos
      for (let i = 0; i < text.length; i++) {
        outputDiv.innerHTML += text.charAt(i);
        scrollContainer.scrollTop = scrollContainer.scrollHeight;
        await new Promise(r => setTimeout(r, 60)); // Digitação mais lenta (era 40)
      }
      
      outputDiv.innerHTML += suffix;
    }

    async function runTerminal() {
      for (const item of cvData) {
        if (item.type === 'cmd') {
          await new Promise(r => setTimeout(r, 1500)); // Pausa maior antes de digitar o comando (era 600)
          await typeText(item.text, true);
        } else {
          await new Promise(r => setTimeout(r, 600)); // Pausa maior para fingir processamento (era 200)
          await typeText(item.text, false);
        }
      }
      
      setTimeout(() => {
        links.style.display = 'flex';
        cursor.style.display = 'none';
        scrollContainer.scrollTop = scrollContainer.scrollHeight;
      }, 1000); // Pausa maior antes de exibir botões finais
    }

    window.onload = () => {
      setTimeout(runTerminal, 1000); // Pausa inicial levemente maior
    };
  </script>
</body>
</html>
